<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú LA BRAVA</title>
    <style>
        :root {
            --primary-color: #000000;
            --accent-color: #e62117;
            --highlight-color: #ffcc00;
            --whatsapp-color: #25D366;
            --facebook-color: #0084FF;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-color); color: white; overflow-x: hidden; }

        /* CARRITO DERECHA */
        .cart-wrapper { position: fixed; top: 15px; right: 15px; z-index: 1100; display: flex; flex-direction: column; align-items: center; }
        #cartFloating { background: var(--accent-color); color: white; padding: 12px 18px; border-radius: 50px; font-weight: bold; border: 2px solid var(--highlight-color); }
        .cart-legend { color: var(--highlight-color); font-size: 10px; margin-top: 5px; font-weight: bold; }

        /* HEADER */
        header { padding: 50px 10px 20px; text-align: center; background: var(--primary-color); border-bottom: 3px solid var(--accent-color); }
        .logo { width: 180px; margin-bottom: 10px; }
        .menu-title { color: var(--highlight-color); font-size: 14px; font-weight: bold; text-transform: uppercase; }

        /* TABS */
        .tabs-container { background: var(--primary-color); display: flex; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .tab-btn { background: #222; color: white; border: none; padding: 15px; flex: 1; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .tab-btn.active { color: var(--highlight-color); border-bottom: 3px solid var(--accent-color); }

        /* GRID */
        .catalogo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; max-width: 600px; margin: auto; }
        .producto-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .img-container { width: 100%; padding-top: 100%; position: relative; }
        .img-container img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }
        .info-card { padding: 10px; text-align: center; font-size: 12px; color: var(--highlight-color); font-weight: bold; }

        /* MODALES */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 10px; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 400px; max-height: 90vh; border-radius: 15px; border: 1px solid var(--accent-color); display: flex; flex-direction: column; overflow: hidden; }
        .modal-img { width: 100%; max-height: 35vh; object-fit: cover; }
        .modal-body { padding: 15px; overflow-y: auto; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: var(--accent-color); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; font-weight: bold; }

        .ingredientes-lista { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .ingrediente-item { font-size: 11px; display: flex; align-items: center; color: #ccc; }
        .ingrediente-item input { margin-right: 8px; width: 18px; height: 18px; accent-color: var(--accent-color); }

        .btn-action { width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; margin-top: 10px; color: white; text-align: center; text-decoration: none; display: block; border: none; }
        .btn-wa { background: var(--whatsapp-color); }
        .btn-fb { background: var(--facebook-color); }
    </style>
</head>
<body>

    <div class="cart-wrapper">
        <div id="cartFloating" onclick="abrirCarrito()">🛒 <span id="cartCount">0</span></div>
        <div class="cart-legend">DA CLICK PARA PEDIR</div>
    </div>

    <header>
        <img src="https://imgur.com/x1ZQGOO.png" class="logo">
        <p class="menu-title">MENÚ SERVICIO A DOMICILIO</p>
    </header>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="cambiarPestana('hamburguesas', this)">Hamburguesas</button>
        <button class="tab-btn" onclick="cambiarPestana('hotdogs', this)">Hot Dogs</button>
        <button class="tab-btn" onclick="cambiarPestana('alitas', this)">Alitas/Boneless</button>
    </div>

    <main id="hamburguesas" class="tab-content">
        <div class="catalogo-grid">
            <div class="producto-card" onclick="abrirModal('Hamburguesa Clásica', 'carne de res, jamón, queso americano, mayonesa, mostaza, catsup, lechuga, jitomate, cebolla, pepinillos, jalapeños', 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500')">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500"></div>
                <div class="info-card">Hamburguesa Clásica</div>
            </div>
            <div class="producto-card" onclick="abrirModal('Hamburguesa Brava 🔥', 'carne de res, jamón, queso americano, mayonesa, tocino, mostaza, catsup, lechuga, jitomate, cebolla, pepinillos, chiles toreados', 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=500')">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=500"></div>
                <div class="info-card">Hamburguesa Brava</div>
            </div>
        </div>
    </main>

    <div id="modalProd" class="modal-overlay" onclick="cerrarModal(event)">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('modalProd').style.display='none'">X</button>
            <img id="mImg" class="modal-img">
            <div class="modal-body">
                <h2 id="mTitle" style="color:var(--highlight-color); margin:0; font-size: 18px;"></h2>
                <div id="mExtras"></div>
                <p style="font-size:11px; color:var(--highlight-color); margin-top:10px; font-weight: bold;">¿QUITAR INGREDIENTES?</p>
                <div id="mIngredientes" class="ingredientes-lista"></div>
                <button class="btn-action" style="background:var(--accent-color)" onclick="agregarAlCarrito()">AÑADIR AL PEDIDO</button>
            </div>
        </div>
    </div>

    <div id="modalCart" class="modal-overlay" onclick="cerrarModal(event)">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('modalCart').style.display='none'">X</button>
            <div class="modal-body">
                <h2 style="color:var(--highlight-color); text-align:center;">MI PEDIDO</h2>
                <div id="listaCarrito"></div>
                <button class="btn-wa btn-action" onclick="enviarPedido('wa')">PEDIR POR WHATSAPP </button>
                <button class="btn-fb btn-action" onclick="enviarPedido('fb')">PEDIR POR FACEBOOK</button>
            </div>
        </div>
    </div>

    <script>
        const MI_WA = "525531887845"; 
        // CAMBIA ESTO: Usa el nombre de usuario de tu página de FB si es posible
        const MI_FB_CHAT = "https://m.me/100083000239346"; 

        let carrito = [];

        function abrirModal(nombre, ingStr, img, piezas = null, salsas = null) {
            document.getElementById('mTitle').innerText = nombre;
            document.getElementById('mImg').src = img;
            const ingDiv = document.getElementById('mIngredientes');
            ingDiv.innerHTML = ingStr.split(', ').map(i => `<div class="ingrediente-item"><input type="checkbox" checked data-ing="${i}"> ${i}</div>`).join('');
            document.getElementById('modalProd').style.display = 'flex';
        }

        function agregarAlCarrito() {
            const nombre = document.getElementById('mTitle').innerText;
            const sin = [];
            document.querySelectorAll('#mIngredientes input:not(:checked)').forEach(i => sin.push(i.dataset.ing));
            carrito.push({ nombre, sin });
            document.getElementById('cartCount').innerText = carrito.length;
            document.getElementById('modalProd').style.display = 'none';
        }

        function abrirCarrito() {
            const lista = document.getElementById('listaCarrito');
            lista.innerHTML = carrito.length === 0 ? "<p>Vacío</p>" : carrito.map((item, idx) => `
                <div style="background:#333; padding:10px; margin-bottom:5px; border-radius:8px;">
                    <strong>${item.nombre}</strong> ${item.sin.length > 0 ? `<br><small style="color:red">SIN: ${item.sin.join(', ')}</small>` : ''}
                </div>
            `).join('');
            document.getElementById('modalCart').style.display = 'flex';
        }

        function enviarPedido(tipo) {
            if(carrito.length === 0) return;
            let msg = "¡Hola LA BRAVA! 🔥 Quisiera este pedido:\n\n";
            carrito.forEach((item, i) => {
                msg += `${i+1}. ${item.nombre}\n${item.sin.length > 0 ? `- SIN: ${item.sin.join(', ')}\n` : ''}`;
            });

            if(tipo === 'wa') {
                // EN WHATSAPP EL TEXTO SÍ APARECE AUTOMÁTICAMENTE
                window.open(`https://wa.me/${MI_WA}?text=${encodeURIComponent(msg)}`);
            } else {
                // EN FACEBOOK SOLO PODEMOS COPIAR Y ABRIR EL CHAT
                const el = document.createElement('textarea');
                el.value = msg;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("✅ Pedido copiado. Pégalo en el chat.");
                window.open(MI_FB_CHAT);
            }
            setTimeout(() => { location.reload(); }, 2000);
        }

        function cambiarPestana(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
        }
        function cerrarModal(e) { if(e.target.className === 'modal-overlay') e.target.style.display = 'none'; }
    </script>
</body>
</html>
