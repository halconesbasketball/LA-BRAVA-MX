<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú LA BRAVA</title>
    <style>
        :root {
            --primary-color: #000000;
            --accent-color: #e62117;
            --highlight-color: #ffcc00;
            --whatsapp-color: #25D366;
            --facebook-color: #0084FF;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-color); color: white; overflow-x: hidden; }

        /* CARRITO FLOTANTE DERECHA */
        .cart-wrapper { position: fixed; top: 15px; right: 15px; z-index: 1100; display: flex; flex-direction: column; align-items: center; }
        #cartFloating { background: var(--accent-color); color: white; padding: 12px 18px; border-radius: 50px; font-weight: bold; border: 2px solid var(--highlight-color); box-shadow: 0 4px 15px rgba(230, 33, 23, 0.6); cursor: pointer; transition: transform 0.2s; }
        #cartFloating:active { transform: scale(0.9); }
        .cart-legend { color: var(--highlight-color); font-size: 10px; margin-top: 5px; font-weight: bold; text-shadow: 1px 1px 2px black; }

        /* HEADER */
        header { padding: 50px 10px 20px; text-align: center; background: var(--primary-color); border-bottom: 3px solid var(--accent-color); }
        .logo { width: 180px; margin-bottom: 10px; }
        .menu-title { color: var(--highlight-color); font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* TABS - flex-wrap para evitar scroll horizontal en celulares */
        .tabs-container { background: var(--primary-color); display: flex; flex-wrap: wrap; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        /* Ajustado a 40% para que sean 2 filas de 2 en pantallas pequeñas */
        .tab-btn { background: #222; color: white; border: none; padding: 12px 5px; flex: 1 1 40%; font-size: 11px; font-weight: bold; text-transform: uppercase; transition: background 0.3s; text-align: center; border-right: 1px solid #111; border-bottom: 1px solid #111; }
        .tab-btn.active { color: var(--highlight-color); border-bottom: 3px solid var(--accent-color); background: #111; }

        /* GRID */
        .catalogo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; max-width: 600px; margin: auto; }
        .producto-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
        .producto-card:active { transform: scale(0.95); border-color: var(--accent-color); }
        .img-container { width: 100%; padding-top: 100%; position: relative; }
        .img-container img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }
        .info-card { padding: 10px; text-align: center; font-size: 12px; color: var(--highlight-color); font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .precio-badge { color: white; background: var(--accent-color); padding: 3px 8px; border-radius: 5px; font-size: 11px; margin-top: 5px; }

        /* MODALES */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 10px; opacity: 0; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 400px; max-height: 95vh; border-radius: 15px; border: 1px solid var(--accent-color); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .modal-img { width: 100%; max-height: 35vh; object-fit: cover; border-bottom: 2px solid var(--accent-color); }
        .modal-body { padding: 15px; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: var(--accent-color); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; font-weight: bold; z-index: 2010; cursor: pointer; }

        .ingredientes-lista { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .ingrediente-item { font-size: 11px; display: flex; align-items: center; color: #ccc; }
        .ingrediente-item input { margin-right: 8px; width: 18px; height: 18px; accent-color: var(--accent-color); }

        .btn-action { width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; margin-top: 10px; color: white; text-align: center; text-decoration: none; display: block; border: none; font-size: 14px; cursor: pointer; transition: opacity 0.2s; }
        .btn-action:active { opacity: 0.8; }
        .btn-wa { background: var(--whatsapp-color); }
        .btn-fb { background: var(--facebook-color); }
        select, input[type="text"] { width: 100%; padding: 14px; margin-top: 5px; background: #333; color: white; border-radius: 10px; border: 1px solid #555; }
        input[type="text"]::placeholder { color: #aaa; }
        
        /* TOAST NOTIFICACIÓN */
        #toast { visibility: hidden; min-width: 250px; background-color: var(--highlight-color); color: black; text-align: center; border-radius: 10px; padding: 12px; position: fixed; z-index: 3000; bottom: 30px; left: 50%; transform: translateX(-50%); font-weight: bold; font-size: 13px; opacity: 0; transition: opacity 0.3s, visibility 0.3s; }
        #toast.show { visibility: visible; opacity: 1; }
        
        /* TOTAL CARRITO */
        .total-container { text-align: right; font-size: 18px; font-weight: bold; color: var(--highlight-color); margin: 15px 0; padding-top: 10px; border-top: 1px dashed #555; }
    </style>
</head>
<body>

    <div class="cart-wrapper">
        <div id="cartFloating" onclick="abrirCarrito()">🛒 <span id="cartCount">0</span></div>
        <div class="cart-legend">DA CLICK PARA PEDIR</div>
    </div>

    <div id="toast">✅ Agregado al pedido</div>

    <header>
        <img src="https://imgur.com/x1ZQGOO.png" class="logo" alt="LA BRAVA">
        <p class="menu-title">MENÚ SERVICIO A DOMICILIO</p>
    </header>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="cambiarPestana('hamburguesas', this)">🍔 Hamburguesas</button>
        <button class="tab-btn" onclick="cambiarPestana('hotdogs', this)">🌭 Hot Dogs</button>
        <button class="tab-btn" onclick="cambiarPestana('alitas', this)">🍗 Boneless/Alitas</button>
        <button class="tab-btn" onclick="cambiarPestana('papas', this)">🍟 Papas</button>
    </div>

    <main id="hamburguesas" class="tab-content">
        <div class="catalogo-grid">
            <div class="producto-card" onclick="abrirModal('Hamburguesa Clásica', 85, 'carne de res, jamón, queso americano, mayonesa, mostaza, catsup, lechuga, jitomate, cebolla, pepinillos, jalapeños', 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500')">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500"></div>
                <div class="info-card">Hamburguesa Clásica <span class="precio-badge">$85</span></div>
            </div>
            <div class="producto-card" onclick="abrirModal('Hamburguesa Brava 🔥', 110, 'carne de res, jamón, queso americano, mayonesa, tocino, mostaza, catsup, lechuga, jitomate, cebolla, pepinillos, chiles toreados', 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=500')">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=500"></div>
                <div class="info-card">Hamburguesa Brava <span class="precio-badge">$110</span></div>
            </div>
        </div>
    </main>

    <main id="hotdogs" class="tab-content" style="display:none;">
        <div class="catalogo-grid">
            <div class="producto-card" onclick="abrirModal('Hot Dog Clásico', 45, 'salchicha jumbo, pan jumbo, jitomate, cebolla, mayonesa, catsup, mostaza', 'https://images.unsplash.com/photo-1541214113241-21578d2d9b62?w=500')">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1541214113241-21578d2d9b62?w=500"></div>
                <div class="info-card">Hot Dog Clásico <span class="precio-badge">$45</span></div>
            </div>
        </div>
    </main>

    <main id="alitas" class="tab-content" style="display:none;">
        <div class="catalogo-grid">
            <div class="producto-card" onclick="abrirModal('Alitas Crujientes', 0, 'bastones de verdura', 'https://images.unsplash.com/photo-1527477396000-e27163b481c2?w=500', ['8 Piezas - $110', '16 Piezas - $200'], ['BBQ', 'Hot', 'Mango Habanero'])">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1527477396000-e27163b481c2?w=500"></div>
                <div class="info-card">Alitas Crujientes <span class="precio-badge">Desde $110</span></div>
            </div>
            <div class="producto-card" onclick="abrirModal('Boneless', 0, 'bastones de verdura', 'https://images.unsplash.com/photo-1562967914-6c82c6509ff6?w=500', ['6 Piezas - $95', '10 Piezas - $140'], ['BBQ', 'Hot', 'Mango Habanero'])">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1562967914-6c82c6509ff6?w=500"></div>
                <div class="info-card">Boneless <span class="precio-badge">Desde $95</span></div>
            </div>
        </div>
    </main>

    <main id="papas" class="tab-content" style="display:none;">
        <div class="catalogo-grid">
            <div class="producto-card" onclick="abrirModal('Papas a la Francesa', 55, 'sal, aderezo de la casa, catsup', 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500')">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500"></div>
                <div class="info-card">Papas a la Francesa <span class="precio-badge">$55</span></div>
            </div>
        </div>
    </main>

    <div id="modalProd" class="modal-overlay" onclick="cerrarModal(event)">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('modalProd').style.display='none'">X</button>
            <img id="mImg" class="modal-img">
            <div class="modal-body">
                <h2 id="mTitle" style="color:var(--highlight-color); margin:0; font-size: 18px;"></h2>
                <span id="mPrecioVal" style="display:none;"></span>
                <div id="mExtras"></div>
                <p style="font-size:11px; color:var(--highlight-color); margin-top:10px; font-weight: bold;">¿QUITAR ALGO?</p>
                <div id="mIngredientes" class="ingredientes-lista"></div>
                <button class="btn-action" style="background:var(--accent-color)" onclick="agregarAlCarrito()">AÑADIR AL PEDIDO</button>
            </div>
        </div>
    </div>

    <div id="modalCart" class="modal-overlay" onclick="cerrarModal(event)">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('modalCart').style.display='none'">X</button>
            <div class="modal-body">
                <h2 style="color:var(--highlight-color); text-align:center; margin-top:0;">MI PEDIDO</h2>
                
                <input type="text" id="nombreCliente" placeholder="¿Cuál es tu nombre? (Opcional)" autocomplete="off">
                <br><br>

                <div id="listaCarrito"></div>
                <div id="totalCarrito" class="total-container">Total: $0</div>
                <button class="btn-wa btn-action" onclick="enviarPedido('wa')">PEDIR POR WHATSAPP</button>
                <button class="btn-fb btn-action" onclick="enviarPedido('fb')">PEDIR POR FACEBOOK</button>
                <button class="btn-action" style="background:#444" onclick="vaciarTodo()">BORRAR TODO</button>
            </div>
        </div>
    </div>

    <script>
        const MI_WA = "525512345678"; // <--- Tu WhatsApp real
        const MI_FB_ID = "100083000239346"; 

        let carrito = [];

        function abrirModal(nombre, precioBase, ingStr, img, piezas = null, salsas = null) {
            document.getElementById('mTitle').innerText = nombre;
            document.getElementById('mPrecioVal').innerText = precioBase; 
            document.getElementById('mImg').src = img;
            
            const extras = document.getElementById('mExtras');
            extras.innerHTML = "";
            
            if(piezas) extras.innerHTML += `<label style="font-size:11px">CANTIDAD:</label><select id="sPiezas">${piezas.map(p=>`<option value="${p}">${p}</option>`).join('')}</select>`;
            if(salsas) extras.innerHTML += `<label style="font-size:11px">SALSA/SABOR:</label><select id="sSalsas">${salsas.map(s=>`<option>${s}</option>`).join('')}</select>`;

            const ingDiv = document.getElementById('mIngredientes');
            ingDiv.innerHTML = ingStr.split(', ').map(i => `<div class="ingrediente-item"><input type="checkbox" checked data-ing="${i}"> ${i}</div>`).join('');
            document.getElementById('modalProd').style.display = 'flex';
        }

        function agregarAlCarrito() {
            const nombre = document.getElementById('mTitle').innerText;
            let precio = parseFloat(document.getElementById('mPrecioVal').innerText);
            
            const p = document.getElementById('sPiezas') ? document.getElementById('sPiezas').value : null;
            const s = document.getElementById('sSalsas') ? document.getElementById('sSalsas').value : null;
            
            if(p && p.includes('$')) {
                precio = parseFloat(p.split('$')[1]);
            }

            const sin = [];
            document.querySelectorAll('#mIngredientes input:not(:checked)').forEach(i => sin.push(i.dataset.ing));
            
            carrito.push({ nombre, precio, p, s, sin });
            
            document.getElementById('cartCount').innerText = carrito.length;
            document.getElementById('modalProd').style.display = 'none';
            mostrarToast();
        }

        function abrirCarrito() {
            const lista = document.getElementById('listaCarrito');
            let total = 0;
            
            if(carrito.length === 0) {
                lista.innerHTML = "<p style='text-align:center; color:#ccc;'>Tu pedido está vacío 🍔</p>";
                document.getElementById('totalCarrito').style.display = 'none';
            } else {
                document.getElementById('totalCarrito').style.display = 'block';
                lista.innerHTML = carrito.map((item, idx) => {
                    total += item.precio;
                    let textoPieza = item.p ? `(${item.p.split(' - ')[0]})` : '';
                    
                    return `
                    <div style="background:#333; padding:10px; margin-bottom:8px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                        <div style="flex:1;">
                            <strong>${item.nombre}</strong> ${textoPieza}
                            ${item.s ? `<br><small style="color:#aaa;">Sabor: ${item.s}</small>` : ''}
                            ${item.sin.length > 0 ? `<br><small style="color:var(--accent-color)">SIN: ${item.sin.join(', ')}</small>` : ''}
                        </div>
                        <div style="font-weight:bold; color:var(--highlight-color); margin-left:10px;">
                            $${item.precio}
                        </div>
                    </div>
                `}).join('');
            }
            
            document.getElementById('totalCarrito').innerText = `TOTAL: $${total}`;
            document.getElementById('modalCart').style.display = 'flex';
        }

        function enviarPedido(tipo) {
            if(carrito.length === 0) return;
            
            let nombreCliente = document.getElementById('nombreCliente').value.trim();
            let msg = nombreCliente 
                ? `¡Hola LA BRAVA! 🔥 Soy *${nombreCliente}* y quisiera este pedido:\n\n` 
                : `¡Hola LA BRAVA! 🔥 Quisiera este pedido:\n\n`;
            
            let total = 0;
            
            carrito.forEach((item, i) => {
                total += item.precio;
                let textoPieza = item.p ? `(${item.p.split(' - ')[0]})` : '';
                msg += `👉 *${item.nombre}* ${textoPieza} -> $${item.precio}\n`;
                if(item.s) msg += `   🔸 Sabor/Salsa: ${item.s}\n`;
                if(item.sin.length > 0) msg += `   ❌ SIN: ${item.sin.join(', ')}\n`;
                msg += "----------\n";
            });
            
            msg += `\n💰 *TOTAL A PAGAR: $${total}*`;

            if(tipo === 'wa') {
                window.open(`https://wa.me/${MI_WA}?text=${encodeURIComponent(msg)}`, '_blank');
            } else {
                const el = document.createElement('textarea');
                el.value = msg; 
                el.setAttribute('readonly', '');
                el.style.position = 'absolute'; el.style.left = '-9999px';
                document.body.appendChild(el); el.select();
                document.execCommand('copy'); document.body.removeChild(el);
                
                alert("✅ Pedido copiado. Se abrirá el chat, pégalo ahí.");
                window.open(`https://m.me/${MI_FB_ID}`, '_blank');
            }

            setTimeout(() => { 
                vaciarTodo(); 
                document.getElementById('modalCart').style.display = 'none';
                document.getElementById('nombreCliente').value = ''; 
            }, 1500);
        }

        function vaciarTodo() { 
            carrito = []; 
            document.getElementById('cartCount').innerText = "0"; 
            abrirCarrito(); 
        }

        function cambiarPestana(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
        }

        function cerrarModal(e) { if(e.target.className.includes('modal-overlay')) e.target.style.display = 'none'; }
        
        function mostrarToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 2500);
        }
    </script>
</body>
</html>
